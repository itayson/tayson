<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus PKG PS4</title>
  <style>
    body {
      margin: 0;
      background: #101010;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      background: #1f1f1f;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    a, button {
      background: #00c853;
      color: black;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      font-size: 14px;
    }

    button {
      background: #2196f3;
      color: white;
    }
  </style>
</head>
<body>

<header>🎮 Meus PKG PS4</header>

<div class="container">

  <div class="card">
    <div class="title">Meu_Jogo.pkg</div>
    <div class="buttons">
      <a href="http://itayson.duckdns.org:8188/Meu_Jogo.pkg">Abrir</a>
      <button onclick="copiar('http://itayson.duckdns.org:8188/Meu_Jogo.pkg')">Copiar link</button>
    </div>
  </div>

  <div class="card">
    <div class="title">Outro_Jogo.pkg</div>
    <div class="buttons">
      <a href="http://itayson.duckdns.org:8188/Outro_Jogo.pkg">Abrir</a>
      <button onclick="copiar('http://itayson.duckdns.org:8188/Outro_Jogo.pkg')">Copiar link</button>
    </div>
  </div>

</div>

<script>
function copiar(link) {
  navigator.clipboard.writeText(link).then(() => {
    alert("Link copiado:\n" + link);
  }).catch(() => {
    prompt("Copie o link:", link);
  });
}
</script>

</body>
</html>
